<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - LobeHub</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5NXBS46NZ6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5NXBS46NZ6');

    function handleContact(e) {
      e.preventDefault();
      const topic = document.getElementById('topic').value;
      gtag('event', 'form_submit', { form_name: 'contact', topic: topic });
      gtag('event', 'generate_lead', { topic: topic });
      document.getElementById('contact-msg').style.display = 'block';
      e.target.reset();
    }
  </script>
  <link rel="stylesheet" href="style.css">
  <style>
    .contact-form {
      max-width: 500px; margin: 0 auto 4rem; padding: 2rem;
      background: #1a1a1a; border: 1px solid #333; border-radius: 12px;
    }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; color: #aaa; margin-bottom: 0.4rem; font-size: 0.9rem; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 0.7rem 1rem; background: #111; border: 1px solid #444;
      border-radius: 8px; color: white; font-size: 0.95rem;
    }
    .form-group textarea { height: 120px; resize: vertical; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: #7c3aed;
    }
    select option { background: #1a1a1a; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a class="logo" href="index.html">🤖 LobeHub</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="agents.html">Agents</a>
        <a href="pricing.html">Pricing</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>

  <section class="hero" style="padding: 4rem 2rem 2rem;">
    <h1>Get in <span class="gradient">Touch</span></h1>
    <p>Have questions? We'd love to hear from you.</p>
  </section>

  <div class="contact-form">
    <form onsubmit="handleContact(event)">
      <div class="form-group">
        <label>Name</label>
        <input type="text" placeholder="Your name" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Topic</label>
        <select id="topic" onchange="gtag('event','form_interaction',{field:'topic',value:this.value})">
          <option value="general">General Inquiry</option>
          <option value="sales">Sales</option>
          <option value="support">Technical Support</option>
          <option value="partnership">Partnership</option>
        </select>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea placeholder="Tell us more..." required></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Send Message</button>
    </form>
    <p id="contact-msg" style="display:none; color:#7c3aed; margin-top:1rem; text-align:center;">✅ Message sent! We'll get back to you soon.</p>
  </div>

  <footer>
    <p>© 2026 LobeHub · <a href="agents.html">Agents</a> · <a href="pricing.html">Pricing</a> · <a href="contact.html">Contact</a></p>
  </footer>
</body>
</html>
